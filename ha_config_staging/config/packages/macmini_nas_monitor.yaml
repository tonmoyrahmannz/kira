command_line:
  - sensor:
      name: macmini_cpu_usage
      unique_id: macmini_cpu_usage_cli
      unit_of_measurement: '%'
      state_class: measurement
      command: >-
        ssh -i /config/ssh/id_ed25519_macmini -o BatchMode=yes -o ConnectTimeout=8 -o StrictHostKeyChecking=accept-new tonmoyrahman@192.168.50.208 '/Users/tonmoyrahman/kira_metrics.sh cpu'
      scan_interval: 90

  - sensor:
      name: macmini_gpu_usage
