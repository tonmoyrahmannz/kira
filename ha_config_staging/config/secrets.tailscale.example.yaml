# Copy values into your HA /config/secrets.yaml

# URL-encoded tailnet endpoint (replace with your tailnet slug)
# Example tailnet slug might be like: yourname.github
tailscale_devices_endpoint: "https://api.tailscale.com/api/v2/tailnet/your-tailnet-slug/devices"

# Full Authorization header value
tailscale_auth_header: "Bearer tskey-api-REPLACE_ME"
