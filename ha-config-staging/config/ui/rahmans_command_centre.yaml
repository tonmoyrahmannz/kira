        \ {\n  0% { box-shadow: 0 0 6px currentColor; }\n  50% { box-shadow: 0 0 22px\
        \ currentColor; }\n  100% { box-shadow: 0 0 6px currentColor; }\n}\n.pulse-node\
        \ { animation: pulse-glow 1.8s infinite ease-in-out; }\n"
- title: System
  path: system
  icon: mdi:server
  type: masonry
  cards:
  - type: grid
    columns: 4
    square: false
    cards:
    - type: custom:button-card
      entity: sensor.system_monitor_processor_use
      name: HA CPU
      icon: mdi:chip
      card_mod:
        style: ha-card{padding:12px;border-radius:14px;border:1px solid var(--divider-color);}
    - type: custom:button-card
      entity: sensor.system_monitor_memory_use_percent
      name: HA Memory
      icon: mdi:memory
      card_mod:
        style: ha-card{padding:12px;border-radius:14px;border:1px solid var(--divider-color);}
    - type: custom:button-card
      entity: sensor.macmini_cpu_usage
      name: Mac Mini CPU
      icon: mdi:desktop-classic
      card_mod:
        style: ha-card{padding:12px;border-radius:14px;border:1px solid var(--divider-color);}
    - type: custom:button-card
      entity: sensor.omarchy_cpu_usage
      name: Omarchy CPU
      icon: mdi:laptop
      card_mod:
        style: ha-card{padding:12px;border-radius:14px;border:1px solid var(--divider-color);}
  - type: custom:expander-card
    title: Home Assistant Host Telemetry
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    cards:
    - type: entities
      entities:
      - sensor.system_monitor_processor_use
      - sensor.system_monitor_memory_use_percent
      - sensor.system_monitor_disk_use_percent
      - sensor.system_monitor_load_1m
      - sensor.system_monitor_last_boot
  - type: custom:expander-card
    title: Mac Mini / NAS Telemetry
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    cards:
    - type: entities
      entities:
      - sensor.macmini_cpu_usage
      - sensor.macmini_memory_usage
      - sensor.macmini_storage_usage
      - sensor.nas_total_usage
      - sensor.nas_media_usage_percent
      - sensor.nas_documents_usage_percent
      - sensor.nas_backups_usage_percent
  - type: custom:auto-entities
    card:
      type: entities
      title: Warnings / stale sensors
      show_header_toggle: false
      card_mod:
        style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    filter:
      include:
      - entity_id: sensor.mqtt_telemetry_freshness
        state: stale
      - entity_id: sensor.mqtt_telemetry_freshness
        state: offline
      - entity_id: sensor.system_monitor_disk_use_percent
        above: 85
      - entity_id: sensor.nas_total_usage
        above: 85
      - entity_id: sensor.macmini_storage_usage
        above: 85
      - entity_id: sensor.omarchy_disk_usage
        above: 85
    show_empty: true
    empty:
      type: markdown
      content: ✅ No warnings or stale telemetry
- title: Service
  path: service
  icon: mdi:lan-connect
  type: masonry
  cards:
  - type: grid
    columns: 4
    square: false
    cards:
    - type: custom:mushroom-template-card
      entity: binary_sensor.kira_openclaw_running
      primary: OpenClaw
      secondary: '{{ ''Running'' if is_state(''binary_sensor.kira_openclaw_running'',''on'')
        else ''Down'' }}'
      icon: mdi:robot-happy-outline
      icon_color: '{{ ''green'' if is_state(''binary_sensor.kira_openclaw_running'',''on'')
        else ''red'' }}'
      card_mod:
        style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    - type: custom:mushroom-template-card
      entity: binary_sensor.plex_service_online
      primary: Plex
      secondary: '{{ ''Online'' if is_state(''binary_sensor.plex_service_online'',''on'')
        else ''Offline'' }}'
      icon: mdi:plex
      icon_color: '{{ ''green'' if is_state(''binary_sensor.plex_service_online'',''on'')
        else ''red'' }}'
      card_mod:
        style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    - type: custom:mushroom-template-card
      entity: binary_sensor.tuya_integration_connected
      primary: Tuya
      secondary: '{{ ''Connected'' if is_state(''binary_sensor.tuya_integration_connected'',''on'')
        else ''Disconnected'' }}'
      icon: mdi:cloud
      icon_color: '{% set s = states(''sensor.tuya_service_status'') %} {% if s ==
        ''online'' %}green{% elif s == ''warning'' %}orange{% else %}red{% endif %}'
      card_mod:
        style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    - type: custom:button-card
      entity: binary_sensor.tailscale_service_online
      name: Remote Access
      icon: mdi:cloud-lock
      card_mod:
        style: ha-card{padding:12px;border-radius:14px;border:1px solid var(--divider-color);}
  - type: custom:expander-card
    title: Tuya Drill-down
    clear: true
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    cards:
    - type: entities
      entities:
      - binary_sensor.tuya_integration_connected
      - binary_sensor.tuya_gateway_reachable
      - sensor.tuya_device_count
      - sensor.tuya_unavailable_device_count
      - sensor.tuya_last_update
  - type: custom:expander-card
    title: Plex Drill-down
    clear: true
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    cards:
    - type: custom:plex-meets-homeassistant
      title: Plex
      entity: sensor.plex_service_status
      protocol: http
      ip: 192.168.50.208
      port: '32400'
  - type: custom:upcoming-media-card
    title: Upcoming Media
    entity: sensor.plex_service_status
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
  - type: custom:expander-card
    title: OpenClaw Drill-down
    clear: true
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    cards:
    - type: entities
      entities:
      - binary_sensor.openclaw_service_online
      - sensor.kira_openclaw_pid
      - sensor.kira_openclaw_memory_mb
      - sensor.kira_last_heartbeat
  - type: custom:expander-card
    title: Remote Access Drill-down
    clear: true
    card_mod:
      style: ha-card{border-radius:14px;border:1px solid var(--divider-color);}
    cards:
    - type: entities
      entities:
      - binary_sensor.tailscale_service_online
      - sensor.internet_status
- title: Environment
  path: environment
  icon: mdi:home-thermometer
  type: masonry
  cards:
  - type: custom:mushroom-climate-card
    entity: climate.ac_master
    layout: horizontal
    hvac_modes:
    - 'off'
    - cool
    - heat
    - fan_only
    - dry
    - auto
  - type: custom:bubble-card
    card_type: button
    button_type: slider
    entity: cover.study_blind
    name: Study Blind
    icon: mdi:blinds
  - type: entities
    title: Environment Controls
    entities:
    - climate.ac_master
    - cover.study_blind
