        \ else '#ff4444' }};\n  --hvac-color: {{ '#00ff7f' if states('climate.ac_master')\
        \ not in ['unknown', 'unavailable'] else '#ff4444' }};\n  --plex-color: {{\
        \ '#00ff7f' if is_state('binary_sensor.plex_service_online', 'on') else '#ff4444'\
        \ }};\n  --omarchy-color: {{ '#00ff7f' if is_state('binary_sensor.omarchy_online',\
        \ 'on') else '#ff4444' }};\n  --tuya-color: {{ '#00ff7f' if ((integration_entities('tuya')\
        \ | count > 0) or (integration_entities('localtuya') | count > 0)) else '#ff4444'\
        \ }};\n  --neo-color: {{ '#00ff7f' if (integration_entities('neo_smart_blinds')\
        \ | count > 0 or states('cover.study_blind') not in ['unknown','unavailable'])\
        \ else '#ff4444' }};\n  --ha-appliance-color: {{ '#00ff7f' if states('sensor.system_monitor_processor_use')\
